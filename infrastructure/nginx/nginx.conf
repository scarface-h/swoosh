user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
events { worker_connections 1024; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  log_format json escape=json '{"time":"$time_iso8601","request_id":"$request_id","remote":"$remote_addr","method":"$request_method","uri":"$uri","status":$status,"bytes":$body_bytes_sent,"duration":$request_time}';
  access_log /dev/stdout json;
  error_log /dev/stderr warn;
  sendfile on;
  server_tokens off;
  gzip on;
  gzip_types application/json text/plain text/css application/javascript image/svg+xml;
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  include /etc/nginx/conf.d/*.conf;
}
