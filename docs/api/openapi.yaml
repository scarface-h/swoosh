  /admin/coupons: { get: { summary: Coupons, responses: { '200': { description: OK } } }, post: { summary: Create coupon, responses: { '201': { description: Created } } } }
  /admin/coupons/{id}: { parameters: [{ in: path, name: id, required: true, schema: { type: string } }], patch: { summary: Update coupon, responses: { '200': { description: OK } } } }
  /admin/reviews: { get: { summary: Review moderation queue, responses: { '200': { description: OK } } } }
  /admin/reviews/{id}/status: { parameters: [{ in: path, name: id, required: true, schema: { type: string } }], patch: { summary: Moderate review, responses: { '200': { description: OK } } } }
  /admin/banners: { get: { summary: Banners, responses: { '200': { description: OK } } }, post: { summary: Create banner, responses: { '201': { description: Created } } } }
  /admin/banners/{id}: { parameters: [{ in: path, name: id, required: true, schema: { type: string } }], patch: { summary: Update banner, responses: { '200': { description: OK } } } }
  /admin/homepage-sections: { get: { summary: Homepage sections, responses: { '200': { description: OK } } }, post: { summary: Create homepage section, responses: { '201': { description: Created } } } }
  /admin/homepage-sections/{id}: { parameters: [{ in: path, name: id, required: true, schema: { type: string } }], patch: { summary: Update homepage section, responses: { '200': { description: OK } } } }
  /admin/settings: { get: { summary: Settings, responses: { '200': { description: OK } } }, patch: { summary: Typed JSON settings, responses: { '200': { description: OK } } } }
  /admin/users: { get: { summary: Admin users, responses: { '200': { description: OK } } }, post: { summary: Create admin, responses: { '201': { description: Created } } } }
