name: swoosh-commerce

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-flush-log-at-trx-commit=1
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-swoosh}
      MYSQL_USER: ${MYSQL_USER:-swoosh_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d:ro
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes: [redis_data:/data]
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    command: ["npm", "run", "db:deploy", "-w", "apps/api"]
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-swoosh_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-swoosh}
    depends_on:
      mysql: { condition: service_healthy }
    networks: [backend]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_VERSION: ${APP_VERSION:-dev}
      DATABASE_URL: mysql://${MYSQL_USER:-swoosh_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-swoosh}
      REDIS_URL: redis://redis:6379
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:?Set ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?Set REFRESH_TOKEN_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS}
      STOREFRONT_URL: ${STOREFRONT_URL}
      ADMIN_URL: ${ADMIN_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      CDN_BASE_URL: ${CDN_BASE_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      SENTRY_DSN: ${SENTRY_DSN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    networks: [backend]
    expose: ["4000"]
    read_only: true
    tmpfs: [/tmp]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 15s
      timeout: 5s
      retries: 5

  certs:
    image: nginx:1.28-alpine
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache openssl >/dev/null
        if [ ! -s /certs/fullchain.pem ] || [ ! -s /certs/privkey.pem ]; then
          openssl req -x509 -nodes -newkey rsa:2048 -days 30 \
            -keyout /certs/privkey.pem -out /certs/fullchain.pem \
            -subj "/CN=localhost" -addext "subjectAltName=DNS:localhost"
        fi
    volumes: [certs_data:/certs]
    restart: "no"

  nginx:
    image: nginx:1.28-alpine
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
      certs: { condition: service_completed_successfully }
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - certs_data:/etc/nginx/certs:ro
    networks: [backend]
    read_only: true
    tmpfs: [/var/cache/nginx, /var/run]
    security_opt: ["no-new-privileges:true"]

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  certs_data:
