name: Frontend CI
on:
  push:
    paths:
      - "apps/admin/**"
      - "apps/storefront/**"
      - "packages/**"
      - "package*.json"
      - "eslint.config.js"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "apps/admin/**"
      - "apps/storefront/**"
      - "packages/**"
      - "package*.json"
      - "eslint.config.js"
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run lint -w apps/storefront
      - run: npm run lint -w apps/admin
      - run: npm run build -w apps/storefront
      - run: npm run build -w apps/admin
      - run: npm audit --omit=dev --audit-level=high
