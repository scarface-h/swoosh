name: Backend CI
on:
  push:
    paths: ['apps/api/**','packages/**','infrastructure/**','docker-compose.yml','package*.json','.github/workflows/backend-ci.yml']
  pull_request:
    paths: ['apps/api/**','packages/**','infrastructure/**','docker-compose.yml','package*.json']
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: swoosh_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7.4-alpine
        ports: ['6379:6379']
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5
    env:
      NODE_ENV: test
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/swoosh_test
      REDIS_URL: redis://127.0.0.1:6379
      ACCESS_TOKEN_SECRET: ci-access-secret-at-least-thirty-two-characters
      REFRESH_TOKEN_SECRET: ci-refresh-secret-at-least-thirty-two-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run db:validate
      - run: npm run db:generate
      - run: npx --yes @redocly/cli lint docs/api/openapi.yaml
      - run: npm run db:deploy
      - run: npm run typecheck -w apps/api
      - run: npm run lint -w apps/api
      - run: npm run test -w apps/api
      - run: npm run build -w apps/api
      - run: npm audit --audit-level=high
  docker:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/api.Dockerfile
          push: false
          tags: swoosh-api:ci
