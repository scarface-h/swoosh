services:
  - type: web
    name: swoosh-shop-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run db:generate -w apps/api && npm run db:deploy -w apps/api && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    healthCheckPath: /ready
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: CORS_ORIGINS
        sync: false
      - key: STOREFRONT_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: web
    name: swoosh-shop-store
    runtime: static
    buildCommand: npm ci && npm run build -w apps/storefront
    staticPublishPath: ./apps/storefront/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: swoosh-shop-admin
    runtime: static
    buildCommand: npm ci && npm run build -w apps/admin
    staticPublishPath: ./apps/admin/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
